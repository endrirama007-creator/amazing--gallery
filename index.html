<!DOCTYPE html>
<html>
<head>
<title>Galeri Keren</title>
<style>
body{background:#111;color:white;font-family:sans-serif}
h1{padding:20px;text-align:center}
.galeri{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:10px}
.galeri img{width:100%;border-radius:10px}
.galeri img:hover{transform:scale(1.05)}
</style>
</head>
<body>
<h1>🔥 GALERI KU 🔥</h1>
<div class="galeri">
<img src="foto1.jpg" alt="Foto 1">
<img src="foto2.jpg" alt="Foto 2">
<img src="foto3.jpg" alt="Foto 3">
<img src="foto4.jpg" alt="Foto 4">
<img src="foto5.jpg" alt="Foto 5">
</div>
</body>
</html>
