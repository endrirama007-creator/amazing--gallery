<!DOCTYPE html>
<html>
<head>
<title>Gallery Keren</title>
<style>
body {background:#111; color:white; font-family:Arial; text-align:center; margin:0}
h1 {padding:20px}
.gallery {display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:15px; padding:20px; max-width:1000px; margin:0 auto}
.gallery img {width:100%; border-radius:10px; transition:0.3s}
.gallery img:hover {transform:scale(1.05)}
</style>
</head>
<body>
<h1>🔥 GALLERY KU 🔥</h1>
<div class="gallery">
<img src="foto1.jpg" alt="Foto 1">
<img src="foto2.jpg" alt="Foto 2">
<img src="foto3.jpg" alt="Foto 3">
<img src="foto4.jpg" alt="Foto 4">
<img src="foto5.jpg" alt="Foto 5">
</div>
</body>
</html>
