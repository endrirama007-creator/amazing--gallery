<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Ku</title>
    <style>
        body { 
            font-family: Arial; 
            background: #111; 
            color: white; 
            text-align: center; 
            padding: 20px;
        }
        h1 { color: #00ff88; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #00ff88;
        }
        .gallery img:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <img src="logo.jpg" alt="Logo" class="logo">
    <h1>📸 GALLERY KU BOS 🔥</h1>
    
    <div class="gallery">
        <img src="images/IMG_2024.jpg" alt="Foto 1">
        <img src="images/Screenshot.png" alt="Foto 2">
        <img src="images/WhatsApp Image.jpg" alt="Foto 3">
    </div>

</body>
</html>
